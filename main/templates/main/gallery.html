{% extends 'base.html' %}

{% block content %}
<section id="gallery" class="py-5">
    <div class="container">
        <h1 class="section-title text-center mb-5">Gallery</h1>
        <div class="row g-4">

            {% for image in images %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <!-- Lightbox using checkbox hack -->
                <label for="img{{ forloop.counter }}-checkbox" class="gallery-card">
                    <img src="{{ image.image.url }}" alt="Gallery Image">
                </label>
                <input type="checkbox" id="img{{ forloop.counter }}-checkbox" class="lightbox-checkbox">
                <div class="lightbox">
                    <label for="img{{ forloop.counter }}-checkbox" class="lightbox-close"></label>
                    <img src="{{ image.image.url }}" alt="Gallery Image">
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</section>
{% endblock %}
